name: Babel
options:
  bundleIdPrefix: com.babel
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_HARDENED_RUNTIME: YES
    # Build ad-hoc; we re-sign post-build with the user's stable Apple
    # Development identity (see scripts/resign.sh). That keeps the code-
    # signature hash stable across rebuilds, so TCC permissions survive.
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: complete
    GCC_WARN_UNINITIALIZED_AUTOS: YES
    CLANG_WARN_SUSPICIOUS_IMPLICIT_CONVERSION: YES

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  Babel:
    type: application
    platform: macOS
    sources:
      - path: Babel
    dependencies:
      - package: WhisperKit
      - package: Sparkle
    info:
      path: Babel/Resources/Info.generated.plist
      properties:
        CFBundleName: Babel
        CFBundleDisplayName: Babel
        CFBundleIdentifier: com.babel.app
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: "26.0"
        LSUIElement: true
        NSMicrophoneUsageDescription: "Babel needs microphone access to transcribe your voice into text on-device."
        NSSpeechRecognitionUsageDescription: "Babel uses Apple's on-device SpeechAnalyzer to turn your voice into text. Audio never leaves your Mac."
        NSHumanReadableCopyright: "© 2026 Babel Contributors. MIT License."
        NSPrincipalClass: NSApplication
        # Sparkle — auto-update feed. The public half of the EdDSA keypair
        # used to verify appcast signatures; its private half lives in the
        # release maintainer's Keychain under "https://sparkle-project.org".
        # Every release DMG must be signed with that private key, otherwise
        # Sparkle will reject the update. See docs/release.md.
        SUFeedURL: "https://raw.githubusercontent.com/matinsaurralde/babel/main/appcast.xml"
        SUPublicEDKey: "K4xa4RCBuEVpW5IKfZRd7n4arfcRW1O/TTn5sn8xmZ4="
        SUEnableInstallerLauncherService: false
    entitlements:
      path: Babel/Resources/Babel.entitlements
      properties:
        com.apple.security.device.audio-input: true
        com.apple.security.automation.apple-events: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.babel.app
        PRODUCT_NAME: Babel
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  BabelTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BabelTests
    dependencies:
      - target: Babel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.babel.app.tests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        # Inherit Babel's deployment target / strict-concurrency settings.
